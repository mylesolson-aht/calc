<html>
<head>
    <title>Calc</title>
</head>
<body>
    <h1>Pricing</h1>
    <p>Legacy Price: $4999</p>
    <p>10 Year Price: $2999</p>
    <form>
        <h2>Manage Options</h2>
        <label><input type='checkbox' name='option1' value='250'> Option 1 ($250)</label><br>
        <label><input type='checkbox' name='option2' value='500'> Option 2 ($500)</label><br>
        <label>Custom Discount: <input type='text' name='custom_discount' maxlength='4' placeholder='max $1000'></label><br>
        <h2>Financing</h2>
        <label>3-Year Financing:</label>
        <input type='text' value='24 months' readonly>
    </form>
    <h2>Initial Amounts</h2>
    <p>Legacy: $4999</p>
    <p>10 Year: $2999</p>
    <h2>UPGRADE_PATHS</h2>
    <p>3 year to 10 year: $2999</p>
    <p>10 year to Legacy: $4999</p>
    <h2>Discounts</h2>
    <p>Discounts apply to Legacy and 10 Year memberships only.</p>
</body>
</html>
